<div class="modal-overlay" id="logout-modal">
  <div class="modal confirm-modal">
    <div class="confirm-icon">👋</div>
    <div class="confirm-title">Logging out?</div>
    <p class="confirm-text">We'll save your progress. See you back on your learning journey soon!</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeLogoutModal()">Stay here</button>
      <button class="btn btn-danger" onclick="confirmLogout()">Yes, logout</button>
    </div>
  </div>
</div>

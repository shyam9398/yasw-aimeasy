<div class="modal-overlay" id="notifications-modal">
  <div class="modal" style="max-width: 500px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
    <!-- Title / Header -->
    <div style="display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem;">
      <h3 style="font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 8px; margin: 0;">
        🔔 Notifications
      </h3>
      <button onclick="closeNotificationsModal()" style="background:none; border:none; cursor:pointer; font-size: 1.1rem; color: var(--text3); font-weight: 700; padding: 4px;">✕</button>
    </div>
    
    <!-- Notification list container -->
    <div id="notif-list-container" style="max-height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;">
      <!-- Populated dynamically via JS -->
    </div>
    
    <!-- Notification detail view (initially hidden) -->
    <div id="notif-detail-container" style="display: none; flex-direction: column; gap: 12px; border-top: 1px solid var(--border); padding-top: 10px;">
      <button onclick="backToNotifList()" class="btn btn-ghost btn-sm" style="align-self: flex-start; padding: 4px 8px; font-size: 0.8rem;">← Back to list</button>
      <div>
        <h4 id="notif-detail-title" style="font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; margin-top: 8px;"></h4>
        <div id="notif-detail-time" style="font-size: 0.75rem; color: var(--text3); margin-bottom: 10px;"></div>
        <p id="notif-detail-message" style="font-size: 0.88rem; color: var(--text2); line-height: 1.6; white-space: pre-wrap; background: var(--surface2); padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--border); margin-top: 8px;"></p>
      </div>
    </div>
  </div>
</div>

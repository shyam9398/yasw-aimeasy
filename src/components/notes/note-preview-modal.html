<div class="modal-overlay" id="note-preview-modal">
  <div class="modal note-preview-modal">
    <span id="note-preview-title" class="note-preview-title" aria-hidden="true"></span>
    <div class="note-preview-actions">
      <button type="button" class="note-preview-icon-btn" id="note-download-btn" title="Download" aria-label="Download">&darr;</button>
      <button type="button" class="note-preview-icon-btn" onclick="closeNotePreview()" title="Close" aria-label="Close">&times;</button>
    </div>
    <div class="note-preview-body" id="note-preview-body"></div>
  </div>
</div>

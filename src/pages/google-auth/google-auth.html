<div class="screen auth-page" id="screen-google-auth">
  <div class="google-auth-card auth-card">
    <div class="google-auth-logo">🔐</div>
    <div id="google-auth-role-tag" style="display:inline-flex;align-items:center;padding:4px 14px;border-radius:50px;font-size:0.8rem;font-weight:600;background:var(--primary-light);color:var(--primary);margin-bottom:0.8rem;">🎓 Student Login</div>
    <div class="google-auth-title" id="google-auth-title">Sign in as Student</div>
    <div class="google-auth-sub" id="google-auth-sub">Accept the terms, then continue with Google.</div>

    <label class="auth-terms-check">
      <input type="checkbox" id="google-auth-terms" onchange="window.updateGoogleAuthTermsState?.()">
      <span>I agree to the Terms & Conditions and Privacy Policy.</span>
    </label>

    <button class="google-btn" id="google-auth-continue" style="width:100%;justify-content:center;margin-bottom:0.5rem;" onclick="googleSignIn('new')" disabled>
      <svg width="20" height="20" viewBox="0 0 20 20"><path fill="#4285F4" d="M19.6 10.23c0-.68-.06-1.36-.17-2H10v3.79h5.39a4.6 4.6 0 01-2 3.02v2.5h3.24c1.9-1.75 3-4.33 3-7.31z"/><path fill="#34A853" d="M10 20c2.7 0 4.96-.9 6.62-2.42l-3.24-2.51c-.9.6-2.04.96-3.38.96-2.6 0-4.8-1.75-5.59-4.11H1.07v2.59A9.99 9.99 0 0010 20z"/><path fill="#FBBC05" d="M4.41 11.92A6.01 6.01 0 014.1 10c0-.67.12-1.32.31-1.93V5.49H1.07A10 10 0 000 10c0 1.61.39 3.14 1.07 4.51l3.34-2.59z"/><path fill="#EA4335" d="M10 3.96c1.47 0 2.79.51 3.83 1.5l2.87-2.87A9.96 9.96 0 0010 0 9.99 9.99 0 001.07 5.49l3.34 2.59C5.2 5.71 7.4 3.96 10 3.96z"/></svg>
      Continue with Google
    </button>

    <button class="btn btn-ghost btn-sm" style="margin-top:1.2rem;width:100%;" onclick="showScreen('screen-landing')">← Back</button>
  </div>
</div>

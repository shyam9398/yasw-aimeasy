<div class="screen" id="screen-creator">
  <div class="admin-sidebar-backdrop" id="cr-sidebar-backdrop" onclick="closeCRSidebar()"></div>

  <aside class="admin-sidebar" id="cr-sidebar">
    <div class="admin-sidebar-header">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="logo-icon" style="width:30px;height:30px;font-size:0.75rem;background:linear-gradient(135deg,var(--teal),var(--lavender));">C</div>
        <span style="font-weight:800;font-size:0.95rem;letter-spacing:-0.02em;">Creator</span>
      </div>
      <button onclick="closeCRSidebar()" style="background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text2);padding:4px;">x</button>
    </div>
    <div style="padding:1rem 1.2rem;border-bottom:1px solid var(--border);margin-bottom:0.5rem;">
      <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:6px;">Logged in as</div>
      <div style="font-weight:700;font-size:0.9rem;" id="cr-sidebar-name">Creator</div>
      <div style="font-size:0.75rem;color:var(--text3);" id="cr-sidebar-info">Content Creator</div>
    </div>
    <nav style="padding:0.5rem 0.8rem;flex:1;">
      <div class="admin-nav-item active" id="cr-nav-dashboard" onclick="switchCRSection('dashboard')">
        <span>📊 Dashboard</span>
      </div>
      <div class="admin-nav-item" id="cr-nav-choosing" onclick="switchCRSection('choosing')">
        <span>➕ Choose</span>
      </div>
      <div class="admin-nav-item" id="cr-nav-addcontent" onclick="switchCRSection('addcontent')">
        <span>✅ Added</span>
      </div>
    </nav>
    <div style="padding:1rem 0.8rem;border-top:1px solid var(--border);">
      <div class="admin-nav-item" onclick="creatorLogout()" style="color:var(--red);">
        <span>Logout</span>
      </div>
    </div>
  </aside>

  <div class="admin-main-wrap" id="cr-main-wrap">
    <header class="admin-topbar" style="display:flex; justify-content:space-between; align-items:center;">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger-btn" id="cr-hamburger" onclick="toggleCRSidebar()" style="display:flex;">
          <span></span><span></span><span></span>
        </button>
        <div>
          <div style="font-weight:800;font-size:1rem;letter-spacing:-0.02em;" id="cr-topbar-title">Creator Dashboard</div>
          <div style="font-size:0.72rem;color:var(--text3);">Content Creator Portal</div>
        </div>
      </div>
      <div style="display:flex; gap:10px; align-items:center; padding-right:1rem;">
        <div class="notif-btn" onclick="openNotificationsModal()" style="position:relative;">
          🔔
          <div class="notif-dot" id="creator-notif-dot" style="display:none;"></div>
        </div>
      </div>
    </header>
    <div class="admin-content" id="cr-content">
      <!-- Content rendered by JS -->
    </div>
  </div>
</div>

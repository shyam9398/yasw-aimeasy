<div class="screen auth-page" id="screen-setting-up-profile">
  <style>
    @keyframes loadingBar {
      0% { left: -50%; }
      100% { left: 100%; }
    }
    @keyframes pulseRing {
      0% { transform: scale(0.95); opacity: 0.2; }
      50% { transform: scale(1.1); opacity: 0.6; }
      100% { transform: scale(0.95); opacity: 0.2; }
    }
  </style>
  <div class="google-auth-card auth-card" style="text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; padding: 3.5rem 2.5rem; box-shadow: 0 20px 50px rgba(79, 142, 247, 0.12); background: var(--surface); border-radius: var(--radius-xl); border: 1px solid var(--border);">
    <!-- Premium Avatar/Logo -->
    <div style="position: relative; width: 80px; height: 80px;">
      <div style="position: absolute; inset: -10px; border: 4px solid var(--primary-light); border-radius: 50%; animation: pulseRing 2.5s infinite ease-in-out;"></div>
      <div style="position: absolute; inset: 0; border: 4px solid var(--teal-light); border-radius: 50%; animation: pulseRing 2.5s infinite reverse ease-in-out;"></div>
      <div style="position: absolute; inset: 12px; background: linear-gradient(135deg, var(--primary), var(--teal)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 4px 15px rgba(79, 142, 247, 0.3);">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
    </div>
    
    <div style="margin-top: 0.5rem;">
      <h3 style="font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; color: var(--text);">
        Setting up your profile
      </h3>
      <p style="font-size: 0.85rem; color: var(--text2); line-height: 1.6; max-width: 280px; margin: 0 auto;">
        Connecting to secure servers and customizing your dashboard details...
      </p>
    </div>

    <!-- Animated Loading/Progress Indicator -->
    <div style="width: 100%; max-width: 200px; height: 5px; background: var(--surface2); border-radius: 10px; overflow: hidden; position: relative; border: 1px solid var(--border); margin-top: 0.5rem;">
      <div style="position: absolute; top: 0; bottom: 0; left: 0; width: 50%; background: linear-gradient(90deg, var(--primary), var(--teal)); border-radius: 10px; animation: loadingBar 1.5s infinite ease-in-out;"></div>
    </div>

    <!-- Dynamic Status Label -->
    <div id="setup-profile-status" style="font-size: 0.78rem; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; min-height: 1.2em;">
      Initializing...
    </div>
  </div>
</div>
